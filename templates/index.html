
{% extends 'base.html' %}

  <time>
    <div class="tick-container">
      <div class="tick">
        <div class="tick">
          <div class="tick">
            <div class="tick">
              <div class="tick">
                <div class="tick"></div>
              </div>
            </div>
          </div>
        </div>
      </div>  
    </div><!-- .tick-container -->
    
    <div id="minute" class="hand"></div>
    <div id="hour" class="hand"></div>
    <div id="second" class="hand"></div>
    
  </time>


  <input type="button" hidden id="antallRader" value="Vis antall rader">
  <br>
  <br>

  <br>
  <br>
  
  <table id="test_table">
  </table>



{% endblock %}
